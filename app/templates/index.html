{% extends "base.html" %}

{% block content %}
<h1>Community Decisions</h1>

{% for post in posts %}
<div class="card">
    <h2>{{ post.title }}</h2>
    <p>{{ post.content[:150] }}...</p>
    <p>Category: {{ post.category }}</p>
    <a href="{{ url_for('main.post_detail', post_id=post.id) }}">View Discussion</a>
</div>
{% else %}
<p>No posts yet. Be the first to create one.</p>
{% endfor %}
{% endblock %}
