{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="fw-bold mb-4">Edit Post</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    <option value="Relationships" {% if post.category == "Relationships" %}selected{% endif %}>Relationships</option>
                    <option value="Career" {% if post.category == "Career" %}selected{% endif %}>Career</option>
                    <option value="Money" {% if post.category == "Money" %}selected{% endif %}>Money</option>
                    <option value="Ethics" {% if post.category == "Ethics" %}selected{% endif %}>Ethics</option>
                    <option value="Technology" {% if post.category == "Technology" %}selected{% endif %}>Technology</option>
                    <option value="Other" {% if post.category == "Other" %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea name="content" class="form-control" rows="6" required>{{ post.content }}</textarea>
            </div>

            <button type="submit" class="btn btn-success">Save Changes</button>
            <a href="{{ url_for('main.post_detail', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
